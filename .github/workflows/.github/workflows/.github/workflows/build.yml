name: Build GorillatagMobile IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: |
          npm install
          npx cap add ios

      - name: Sync Web Code to Native Layout
        run: npx cap sync ios

      - name: Build Xcode Project Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean archive \
                     -archivePath $PWD/build/App.xcarchive

      - name: Package Archive into Unsigned IPA
        run: |
          mkdir -p $PWD/build/Payload
          cp -r $PWD/build/App.xcarchive/Products/Applications/App.app $PWD/build/Payload/
          cd $PWD/build && zip -r GorillatagMobile.ipa Payload

      - name: Upload Finished IPA File
        uses: actions/upload-artifact@v4
        with:
          name: GorillatagMobile-App
          path: build/GorillatagMobile.ipa
