name: Build Mobile IPA
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install --legacy-peer-deps || npm install

      - name: Sync Project
        run: |
          npx cap init "GorillatagMobile" "com.gorillatag.mobile" --web-dir=www || true
          npx cap add ios || true
          npx cap sync ios

      - name: Build Xcode
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean archive \
                     -archivePath $PWD/build/App.xcarchive

      - name: Package IPA
        run: |
          mkdir -p $PWD/build/Payload
          cp -r $PWD/build/App.xcarchive/Products/Applications/App.app $PWD/build/Payload/
          cd $PWD/build && zip -r GorillatagMobile.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GorillatagMobile-App
          path: build/GorillatagMobile.ipa
